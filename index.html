<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
  body { padding: 4px; background: #fff; display: flex; flex-direction: column; gap: 4px; }
  .card { border: 1px solid #000; padding: 4px; }
  .head { font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; }
  .etas { display: flex; gap: 4px; margin-top: 4px; }
  .time { flex: 1; border: 1px solid #aaa; text-align: center; font-size: 20px; font-weight: bold; padding: 6px 0; }
  #upd { font-size: 10px; text-align: right; color: #666; }
</style>
</head>
<body>

<div class="card">
  <div class="head"><span>680</span><span>Kam Chun Court</span></div>
  <div class="etas" id="r-680">
    <div class="time">--:--</div>
    <div class="time">--:--</div>
  </div>
</div>

<div class="card">
  <div class="head"><span>289K</span><span>Ocean View</span></div>
  <div class="etas" id="r-289k">
    <div class="time">--:--</div>
    <div class="time">--:--</div>
  </div>
</div>

<div id="upd">Upd --:--</div>

<script>
const ROUTES = [
  { id: 'r-680', url: 'https://data.etabus.gov.hk/v1/transport/kmb/eta/914D16773FCDEBD8/680/1' },
  { id: 'r-289k', url: 'https://data.etabus.gov.hk/v1/transport/kmb/eta/8883B612C26E23FC/289K/1' }
];

async function updateRoute({ id, url }) {
  const slots = document.getElementById(id).children;
  try {
    const res = await fetch(url);
    const json = await res.json();
    const list = (json.data || []).filter(x => x.eta).slice(0, 2);

    list.forEach((item, i) => {
      const eta = new Date(item.eta);
      slots[i].textContent = eta.toTimeString().slice(0, 5);
    });
  } catch (e) { /* Keeps last loaded times if network drops */ }
}

function refreshAll() {
  ROUTES.forEach(updateRoute);
  document.getElementById('upd').textContent = 'Upd ' + new Date().toTimeString().slice(0, 5);
}

refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
