<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Costa Bus Dashboard</title>
  <style>
    /* E-INK / MONOCHROME OPTIMIZED STYLES */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      width: 100vw;
      height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #000000;
      padding-bottom: 8px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .status-bar {
      font-size: 0.9rem;
      font-weight: bold;
    }

    .dashboard-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      flex-grow: 1;
    }

    .card {
      border: 2px solid #000000;
      border-radius: 6px;
      padding: 10px 14px;
      background: #ffffff;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px dashed #000000;
      padding-bottom: 6px;
      margin-bottom: 8px;
    }

    .route-badge {
      background: #000000;
      color: #ffffff;
      font-weight: 900;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 1.2rem;
    }

    .stop-name {
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .eta-list {
      list-style: none;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .eta-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #000000;
      padding: 6px;
      border-radius: 4px;
      background: #f8f8f8;
    }

    .eta-slot {
      font-size: 0.75rem;
      font-weight: bold;
      color: #333333;
    }

    .eta-time {
      font-size: 0.85rem;
      margin: 2px 0;
    }

    .eta-mins {
      font-size: 1.1rem;
      font-weight: 900;
    }

    .no-bus {
      width: 100%;
      text-align: center;
      font-weight: bold;
      padding: 8px 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>La Costa Bus Dashboard</h1>
    <div class="status-bar">
      Updated: <span id="last-update">--:--</span>
    </div>
  </header>

  <div class="dashboard-grid" id="dashboard">
    <div class="no-bus">Loading active stops...</div>
  </div>

  <script>
    const ROUTES_CONFIG = [
      { route: "43X", direction: "O", target_stop: "KAM ON COURT", service_type: "1", stop_id: null },
      { route: "680", direction: "O", target_stop: "KAM CHUN COURT", service_type: "1", stop_id: null },
      { route: "A41P", direction: "O", target_stop: "PO TAI STREET", service_type: "1", stop_id: null }
    ];

    // Resolve Stop IDs once when page initializes
    async function initStopIds() {
      for (let config of ROUTES_CONFIG) {
        const dir = config.direction === "I" ? "inbound" : "outbound";
        try {
          const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${config.route}/${dir}/${config.service_type}`);
          const data = await res.json();
          
          for (let item of data.data || []) {
            const stopInfoRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${item.stop}`);
            const stopInfo = await stopInfoRes.json();
            const stopName = (stopInfo.data?.name_en || "").toUpperCase();
            
            if (stopName.includes(config.target_stop.toUpperCase())) {
              config.stop_id = item.stop;
              config.resolved_name = stopInfo.data.name_en;
              break;
            }
          }
        } catch (e) {
          console.error(`Failed lookup for ${config.route}:`, e);
        }
      }
      refreshDashboard();
    }

    async function fetchETA(stopId, route, targetDir) {
      if (!stopId) return [];
      try {
        const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
        const data = await res.json();
        return (data.data || []).filter(b => b.route === route && b.dir === targetDir && b.eta);
      } catch (e) {
        console.error(`ETA fetch error for ${route}:`, e);
        return [];
      }
    }

    async function refreshDashboard() {
      const container = document.getElementById('dashboard');
      let html = '';

      for (let config of ROUTES_CONFIG) {
        const etas = await fetchETA(config.stop_id, config.route, config.direction);
        const displayEtas = etas.slice(0, 3);

        html += `
          <div class="card">
            <div class="card-header">
              <span class="route-badge">${config.route}</span>
              <span class="stop-name">${config.resolved_name || config.target_stop}</span>
            </div>
            <div class="eta-list">
        `;

        if (displayEtas.length === 0) {
          html += `<div class="no-bus">No upcoming departures scheduled</div>`;
        } else {
          displayEtas.forEach((bus, i) => {
            const etaTime = new Date(bus.eta);
            const now = new Date();
            const mins = Math.round((etaTime - now) / 60000);
            const timeStr = etaTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

            let label = mins <= 0 ? 'ARRIVING' : `${mins} MINS`;

            html += `
              <div class="eta-item">
                <span class="eta-slot">BUS ${i + 1}</span>
                <span class="eta-time">${timeStr}</span>
                <span class="eta-mins">${label}</span>
              </div>
            `;
          });
        }

        html += `</div></div>`;
      }

      container.innerHTML = html;
      
      const now = new Date();
      document.getElementById('last-update').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    // Single 60-second timer to avoid screen flashing
    setInterval(refreshDashboard, 60000);

    initStopIds();
  </script>
</body>
</html>
