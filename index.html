<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bus ETA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
  html, body { background: #fff; color: #000; width: 100%; height: 100%; overflow: hidden; padding: 4px; }
  
  .card { border: 1px solid #000; padding: 4px; margin-bottom: 4px; }
  .head { font-size: 13px; font-weight: bold; margin-bottom: 2px; display: flex; justify-content: space-between; }
  
  .etas { display: flex; gap: 4px; }
  .bus { flex: 1; border: 1px solid #aaa; text-align: center; padding: 2px 0; }
  .time { font-size: 11px; color: #333; line-height: 1.1; }
  .mins { font-size: 17px; font-weight: bold; line-height: 1.1; }
  
  #upd { font-size: 10px; text-align: right; color: #555; padding-right: 2px; }
</style>
</head>
<body>

<div class="card">
  <div class="head"><span>680</span><span>Kam Chun Ct</span></div>
  <div class="etas" id="r-680">
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
  </div>
</div>

<div class="card">
  <div class="head"><span>289K &rarr; Univ</span><span>Ocean View</span></div>
  <div class="etas" id="r-289k">
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
  </div>
</div>

<div id="upd">Upd --:--</div>

<script>
const CONFIG = [
  { id: 'r-680', url: 'https://data.etabus.gov.hk/v1/transport/kmb/route-eta/680/1', seq: 7 },
  { id: 'r-289k', url: 'https://data.etabus.gov.hk/v1/transport/kmb/route-eta/289K/1', seq: 9 }
];

async function updateETA(cfg) {
  const el = document.getElementById(cfg.id);
  const slots = el.querySelectorAll('.bus');
  
  try {
    const res = await fetch(cfg.url);
    if (!res.ok) throw new Error();
    const json = await res.json();
    
    const data = (json.data || [])
      .filter(x => String(x.seq) === String(cfg.seq) && x.eta)
      .sort((a,b) => new Date(a.eta) - new Date(b.eta))
      .slice(0, 2);

    slots.forEach((bus, i) => {
      if (data[i] && data[i].eta) {
        const eta = new Date(data[i].eta);
        const mins = Math.max(0, Math.round((eta - Date.now()) / 60000));
        bus.children[0].textContent = eta.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        bus.children[1].textContent = mins <= 1 ? 'ARR' : mins + 'm';
      } else {
        bus.children[0].textContent = '--:--';
        bus.children[1].textContent = '--';
      }
    });
  } catch(e) {
    slots.forEach(b => { b.children[0].textContent = 'ERR'; b.children[1].textContent = '--'; });
  }
}

async function refreshAll() {
  await Promise.allSettled(CONFIG.map(updateETA));
  const now = new Date();
  document.getElementById('upd').textContent = 'Upd ' + 
    now.getHours().toString().padStart(2,'0') + ':' + 
    now.getMinutes().toString().padStart(2,'0');
}

refreshAll();
setInterval(refreshAll, 30000);
</script>

</body>
</html>
