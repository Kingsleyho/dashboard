<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; padding: 4px; display: flex; flex-direction: column; }
  .card { flex: 1; border: 1px solid #000; padding: 4px; margin-bottom: 4px; display: flex; flex-direction: column; justify-content: space-between; }
  .head { font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; }
  .etas { display: flex; gap: 4px; flex: 1; margin-top: 2px; }
  .bus { flex: 1; border: 1px solid #aaa; text-align: center; display: flex; flex-direction: column; justify-content: center; }
  .time { font-size: 11px; color: #444; }
  .mins { font-size: 18px; font-weight: bold; }
  #upd { font-size: 10px; text-align: right; color: #666; }
</style>
</head>
<body>

<div class="card">
  <div class="head"><span>680</span><span>Kam Chun Ct</span></div>
  <div class="etas" id="r-680">
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
  </div>
</div>

<div class="card">
  <div class="head"><span>289K &rarr; Univ</span><span>Ocean View</span></div>
  <div class="etas" id="r-289k">
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
  </div>
</div>

<div id="upd">Upd --:--</div>

<script>
// Using direct Stop-ETA API endpoints (Stop IDs: 914D16773FCDEBD8 for Kam Chun Ct, 8FA7590FF6FFBF87 for Ocean View)
const URL_680 = "https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/914D16773FCDEBD8";
const URL_289K = "https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/8FA7590FF6FFBF87";

function load(url, routeName, bound, elId) {
  const slots = document.getElementById(elId).children;
  
  fetch(url)
    .then(r => r.json())
    .then(json => {
      // Filter for specific route & direction, then take top 2
      const list = (json.data || [])
        .filter(x => x.route === routeName && (bound ? x.bound === bound : true) && x.eta)
        .slice(0, 2);

      for (let i = 0; i < 2; i++) {
        const bus = slots[i];
        if (list[i]) {
          const eta = new Date(list[i].eta);
          const m = Math.max(0, Math.round((eta - Date.now()) / 60000));
          
          bus.children[0].textContent = eta.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
          bus.children[1].textContent = m <= 1 ? 'ARR' : m + 'm';
        } else {
          bus.children[0].textContent = '--:--';
          bus.children[1].textContent = '--';
        }
      }
    })
    .catch(() => {
      slots[0].children[0].textContent = 'ERR';
      slots[1].children[0].textContent = 'ERR';
    });
}

function update() {
  // 680 Outbound (O = towards Admiralty/Central)
  load(URL_680, "680", "O", "r-680");
  
  // 289K Circular to University Station
  load(URL_289K, "289K", null, "r-289k");

  const now = new Date();
  document.getElementById('upd').textContent = 'Upd ' + 
    String(now.getHours()).padStart(2,'0') + ':' + 
    String(now.getMinutes()).padStart(2,'0');
}

update();
setInterval(update, 30000);
</script>

</body>
</html>
