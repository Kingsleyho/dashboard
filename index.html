<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>680 Kam Chun Court</title>

<style>
body{
  font-family:sans-serif;
  margin:10px;
  background:#fff;
  color:#000
}
h1{
  font-size:18px;
  margin-bottom:4px
}
#updated{
  font-size:12px;
  margin-bottom:8px
}
#etas{
  display:flex;
  gap:6px
}
.bus{
  flex:1;
  border:1px solid #000;
  padding:6px;
  text-align:center
}
.slot{
  font-size:11px
}
.time{
  font-size:13px
}
.mins{
  font-size:18px;
  font-weight:bold
}
</style>

</head>
<body>

<h1>680 Kam Chun Court</h1>
<div id="updated">--:--</div>

<div id="etas">
  <div class="bus">
    <div class="slot">BUS 1</div>
    <div class="time">--:--</div>
    <div class="mins">--</div>
  </div>

  <div class="bus">
    <div class="slot">BUS 2</div>
    <div class="time">--:--</div>
    <div class="mins">--</div>
  </div>

  <div class="bus">
    <div class="slot">BUS 3</div>
    <div class="time">--:--</div>
    <div class="mins">--</div>
  </div>
</div>

<script>
const API =
"https://data.etabus.gov.hk/v1/transport/kmb/route-eta/680/1";

const buses = document.querySelectorAll(".bus");

async function updateETA() {
  try {
    const res = await fetch(API);
    const json = await res.json();

    const data = (json.data || [])
      .filter(x => x.seq === 7 && x.eta)
      .sort((a,b) => new Date(a.eta) - new Date(b.eta))
      .slice(0,3);

    buses.forEach((bus,i) => {
      const t = bus.querySelector(".time");
      const m = bus.querySelector(".mins");

      if(data[i]){
        const eta = new Date(data[i].eta);

        const mins = Math.max(
          0,
          Math.round((eta - Date.now())/60000)
        );

        t.textContent = eta.toLocaleTimeString([],{
          hour:"2-digit",
          minute:"2-digit",
          hour12:false
        });

        m.textContent =
          mins <= 1 ? "ARR" : mins + "m";
      } else {
        t.textContent = "--:--";
        m.textContent = "--";
      }
    });

  } catch(e) {
    document.getElementById("etas").innerHTML =
      "<div>API ERROR</div>";
    console.log(e);
  }

  document.getElementById("updated").textContent =
    "Updated " +
    new Date().toLocaleTimeString([],{
      hour:"2-digit",
      minute:"2-digit",
      hour12:false
    });
}

updateETA();
setInterval(updateETA,30000);
</script>

</body>
</html>
