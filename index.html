<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bus ETA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
  body { background: #fff; color: #000; padding: 6px; }
  
  .card { border: 1px solid #000; padding: 6px; margin-bottom: 6px; }
  .head { font-size: 14px; font-weight: bold; margin-bottom: 4px; display: flex; justify-content: space-between; }
  
  .etas { display: flex; gap: 4px; }
  .bus { flex: 1; border: 1px solid #aaa; text-align: center; padding: 4px 2px; }
  .time { font-size: 11px; color: #444; }
  .mins { font-size: 18px; font-weight: bold; }
  
  #upd { font-size: 10px; text-align: center; color: #666; margin-top: 4px; }
</style>
</head>
<body>

<!-- ROUTE 680 -->
<div class="card">
  <div class="head"><span>680</span><span>Kam Chun Ct</span></div>
  <div class="etas" id="r-680">
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
  </div>
</div>

<!-- ROUTE 289K -->
<div class="card">
  <div class="head"><span>289K &rarr; Univ</span><span>Ocean View</span></div>
  <div class="etas" id="r-289k">
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
    <div class="bus"><div class="time">--:--</div><div class="mins">--</div></div>
  </div>
</div>

<div id="upd">Upd --:--</div>

<script>
const CONFIG = [
  { id: 'r-680', url: 'https://data.etabus.gov.hk/v1/transport/kmb/route-eta/680/1', seq: 7 },
  { id: 'r-289k', url: 'https://data.etabus.gov.hk/v1/transport/kmb/route-eta/289K/1', seq: 9 }
];

async function updateETA(cfg) {
  const el = document.getElementById(cfg.id);
  const slots = el.querySelectorAll('.bus');
  
  try {
    const res = await fetch(cfg.url);
    const json = await res.json();
    
    const data = (json.data || [])
      .filter(x => x.seq === cfg.seq && x.eta)
      .sort((a,b) => new Date(a.eta) - new Date(b.eta))
      .slice(0, 2); // strictly top 2 consecutive buses

    slots.forEach((bus, i) => {
      const t = bus.children[0];
      const m = bus.children[1];
      
      if (data[i]) {
        const eta = new Date(data[i].eta);
        const mins = Math.max(0, Math.round((eta - Date.now()) / 60000));
        
        t.textContent = eta.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        m.textContent = mins <= 1 ? 'ARR' : mins + 'm';
      } else {
        t.textContent = '--:--';
        m.textContent = '--';
      }
    });
  } catch(e) {
    el.innerHTML = '<div style="font-size:11px">ERR</div>';
  }
}

async function refreshAll() {
  await Promise.all(CONFIG.map(updateETA));
  const now = new Date();
  document.getElementById('upd').textContent = 'Upd ' + 
    now.getHours().toString().padStart(2,'0') + ':' + 
    now.getMinutes().toString().padStart(2,'0');
}

refreshAll();
setInterval(refreshAll, 30000);
</script>

</body>
</html>
