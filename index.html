<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Costa Bus Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff; color: #000000;
      width: 100vw; height: 100vh; padding: 12px;
      display: flex; flex-direction: column; justify-content: space-between;
      overflow: hidden;
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 3px solid #000; padding-bottom: 8px;
    }
    h1 { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; }
    .status-bar { font-size: 0.9rem; font-weight: bold; }
    .dashboard-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; flex-grow: 1; }
    .card { border: 2px solid #000; border-radius: 6px; padding: 10px 14px; background: #fff; }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px dashed #000; padding-bottom: 6px; margin-bottom: 8px;
    }
    .route-badge { background: #000; color: #fff; font-weight: 900; padding: 3px 10px; border-radius: 4px; font-size: 1.2rem; }
    .stop-name { font-size: 1rem; font-weight: bold; text-transform: uppercase; }
    .eta-list { display: flex; justify-content: space-between; gap: 10px; list-style: none; }
    .eta-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 1px solid #000; padding: 6px; border-radius: 4px; background: #fff;
    }
    .eta-slot { font-size: 0.75rem; font-weight: bold; color: #333; }
    .eta-time { font-size: 0.85rem; margin: 2px 0; }
    .eta-mins { font-size: 1.1rem; font-weight: 900; }
    .no-bus { width: 100%; text-align: center; font-weight: bold; padding: 8px 0; }
  </style>
</head>
<body>

  <header>
    <h1>La Costa Bus Dashboard</h1>
    <div class="status-bar">Updated: <span id="last-update">--:--</span></div>
  </header>

  <div class="dashboard-grid" id="dashboard">
    <div class="no-bus">Connecting to KMB API...</div>
  </div>

  <script>
    const ROUTES = [
      { route: "43X", stop_id: "90EEAA6D546F38E2", stop_name: "Kam On Court" },
      { route: "680", stop_id: "E42BA38EA04FF59D", stop_name: "Kam Chun Court" },
      { route: "A41P", stop_id: "72F67BA8BD14C92B", stop_name: "Po Tai Street" }
    ];

    async function fetchETA(item) {
      try {
        const url = `https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${item.stop_id}`;
        const res = await fetch(url, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });
        
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        
        // Filter strictly for this route
        const busEtas = (json.data || []).filter(b => b.route === item.route && b.eta);
        return { item, etas: busEtas };
      } catch (err) {
        console.warn(`Fetch failed for ${item.route}:`, err);
        return { item, etas: null };
      }
    }

    async function updateDashboard() {
      const container = document.getElementById('dashboard');
      let html = '';

      for (const config of ROUTES) {
        const { item, etas } = await fetchETA(config);
        
        html += `
          <div class="card">
            <div class="card-header">
              <span class="route-badge">${item.route}</span>
              <span class="stop-name">${item.stop_name}</span>
            </div>
            <div class="eta-list">
        `;

        if (etas === null) {
          html += `<div class="no-bus">API Error - Retrying...</div>`;
        } else if (etas.length === 0) {
          html += `<div class="no-bus">No upcoming departures</div>`;
        } else {
          etas.slice(0, 3).forEach((bus, i) => {
            const etaTime = new Date(bus.eta);
            const mins = Math.round((etaTime - new Date()) / 60000);
            const timeStr = etaTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            const label = mins <= 0 ? 'ARRIVING' : `${mins} MINS`;

            html += `
              <div class="eta-item">
                <span class="eta-slot">BUS ${i + 1}</span>
                <span class="eta-time">${timeStr}</span>
                <span class="eta-mins">${label}</span>
              </div>
            `;
          });
        }

        html += `</div></div>`;
      }

      container.innerHTML = html;
      document.getElementById('last-update').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    // Initial run + 45s interval
    updateDashboard();
    setInterval(updateDashboard, 45000);
  </script>
</body>
</html>
